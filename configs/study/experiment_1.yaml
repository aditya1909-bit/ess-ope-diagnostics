experiment_id: experiment_1
title: Bandit reward-variance sanity check
environment:
  name: contextual_bandit
  mismatch_alpha: 0.4
grid:
  sample_size: [100, 500, 1000]
  reward_variance_scale: [0.1, 0.25, 0.5, 1.0, 2.0, 4.0]
estimators: [is, snis, dm, dr]
intervals:
  methods: [bootstrap_percentile, bootstrap_normal]
  levels: [0.9]
  primary_level: 0.9
  bootstrap_samples: 500
  subsample_ratio: 1.0
  enable_concentration: false
replicates: 500
seeds: [0]
